apiVersion: apps/v1
kind: Deployment
metadata:
  name: meteo-hist-deployment
  labels:
    app: meteo-hist
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meteo-hist
  template:
    metadata:
      labels:
        app: meteo-hist
    spec:
      containers:
      - name: meteo-hist
        image: trgqn/meteo-hist:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8501
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: meteo-hist-service
spec:
  type: NodePort
  selector:
    app: meteo-hist
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
      nodePort: 30001
