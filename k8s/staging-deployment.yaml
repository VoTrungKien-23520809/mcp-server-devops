---
apiVersion: v1
kind: Namespace
metadata:
  name: staging # Tạo một khu vực riêng biệt gọi là staging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-deployment
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mcp-server
        image: kienvo2110/mcp-server-app:stable
        imagePullPolicy: Always
        command: ["python", "main.py"]
        envFrom:
        - secretRef:
            name: mcp-server-secrets
            optional: true
        env:
        - name: WORKSPACE_ROOT
          value: /app
        ports:
        - containerPort: 8081
          name: metrics
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        readinessProbe:
          exec:
            command: ["/bin/sh", "-c", "pgrep -f 'python main.py' >/dev/null"]
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          exec:
            command: ["/bin/sh", "-c", "pgrep -f 'python main.py' >/dev/null"]
          initialDelaySeconds: 20
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
