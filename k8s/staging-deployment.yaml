---
apiVersion: v1
kind: Namespace
metadata:
  name: staging # Tạo một khu vực riêng biệt gọi là staging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-deployment
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      imagePullSecrets: 
      - name: dockerhub-secret
      containers:
      - name: mcp-server
        image: kienvo2110/mcp-server-app:latest
        imagePullPolicy: Always
        # Lệnh này giữ container sống nền để phục vụ kết nối stdio của AI Agent
        command: ["tail", "-f", "/dev/null"] 
        envFrom:
        - secretRef:
            name: mcp-server-secrets
        env:
        - name: WORKSPACE_ROOT
          value: /app
        ports:
        - containerPort: 8081
          name: metrics
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        # Chỉ giữ lại cấu hình chạy user non-root để qua bài Checkov
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001