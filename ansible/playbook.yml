---
- name: Setup Azure VM for DevOps Project
  hosts: azure_vm
  become: yes # Chạy lệnh với quyền sudo

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required basic packages
      apt:
        name:
          - ca-certificates
          - curl
          - wget
          - git
          - python3-pip
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Add azureuser to docker group
      user:
        name: azureuser
        groups: docker
        append: yes

    - name: Ensure Docker service is enabled and running
      service:
        name: docker
        enabled: yes
        state: started

    - name: Start SonarQube container
      shell: |
        docker ps -a --format '{{"{{"}}.Names{{"}}"}}' | grep -qx sonarqube || \
        docker run -d --name sonarqube -p 9000:9000 sonarqube:lts-community
      register: sonar_result
      failed_when: 
        - sonar_result.rc != 0
        - "'Conflict' not in sonar_result.stderr" # Bỏ qua lỗi nếu container đã chạy

    - name: Install K3s (Lightweight Kubernetes)
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC='server --write-kubeconfig-mode 600' sh -
      args:
        creates: /usr/local/bin/k3s # Bỏ qua nếu đã cài K3s

    - name: Restrict k3s config permissions
      file:
        path: /etc/rancher/k3s/k3s.yaml
        mode: '0644'
